<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;touch-action:manipulation;user-select:none}
        .game{background:#16213e;border-radius:20px;padding:20px;max-width:400px;width:100%}
        h1{text-align:center;margin-bottom:15px}
        .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
        .cell{aspect-ratio:1;background:#0f3460;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:bold;cursor:pointer}
        .cell.taken{cursor:not-allowed;opacity:.7}
        .cell.X{color:#e94560}.cell.O{color:#00b4d8}
        .info{text-align:center;font-size:18px;margin:10px 0}
        button{width:100%;padding:15px;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;background:#e94560;color:#fff;margin-top:10px}
        button:active{transform:scale(.95)}
    </style>
</head>
<body>
<div class="game">
    <h1>🎮 Крестики-нолики</h1>
    <div class="info" id="info">Ход: ❌ Игрок X</div>
    <div class="board" id="board"></div>
    <button onclick="resetGame()">🔄 Новая игра</button>
</div>
<script>
let board=Array(9).fill(''),turn='X',active=true;
const info=document.getElementById('info'),boardDiv=document.getElementById('board');
function draw(){boardDiv.innerHTML='';board.forEach((v,i)=>{let c=document.createElement('div');c.className='cell';c.textContent=v||'';if(v)c.classList.add('taken',v);c.onclick=()=>move(i);boardDiv.appendChild(c)})}
function move(i){if(!active||board[i])return;board[i]=turn;draw();if(check(turn)){info.textContent='🎉 '+turn+' победил!';active=false;return}if(!board.includes('')){info.textContent='🤝 Ничья!';active=false;return}turn=turn==='X'?'O':'X';info.textContent='Ход: '+(turn==='X'?'❌':'⭕')+' Игрок '+turn}
function check(p){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return w.some(([a,b,c])=>board[a]===p&&board[b]===p&&board[c]===p)}
function resetGame(){board=Array(9).fill('');turn='X';active=true;info.textContent='Ход: ❌ Игрок X';draw()}
draw();
</script>
</body>
</html>
